name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

# Step 2: deny-all at workflow level, grant per job
permissions: {}

jobs:
  secret-scanner:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Step 3
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Step 1: pinned to SHA — was @main (supply chain risk)
      - name: TruffleHog
        id: trufflehog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.88.1
        continue-on-error: true
        with:
          extra_args: --results=verified,unknown

      - name: Fail on secrets found
        if: steps.trufflehog.outcome == 'failure'
        run: exit 1

  sast-scan:
    name: SAST (SonarQube)
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Step 3
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@bfd4e558cda28cda6b5defafb9232d191be8c203 # v4.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496 # v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  codeql-scan:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Step 3
    permissions:
      contents: read
      security-events: write # upload SARIF to Security tab
      actions: read # required by codeql analyze to fetch workflow run info
    strategy:
      matrix:
        language: [javascript] # covers both frontend (React) and backend (Node)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Step 11: initialize CodeQL — builds AST + data flow graph
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended # OWASP Top 10 + injection + XSS + SSRF

      - name: Autobuild
        uses: github/codeql-action/autobuild@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7c1e4cf0b20d7c1872b26569c00ba908797a59bf # v4
        with:
          category: /language:${{ matrix.language }}

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Step 3
    permissions:
      contents: read
      security-events: write # Step 7: upload SARIF to Security tab
      actions: read # required by upload-sarif to fetch workflow run info
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Step 8 preview: cache npm to avoid re-downloading every run
      - name: Cache npm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: |
          npm ci --prefix frontend
          npm ci --prefix backend

      # Step 1: pinned — was @main
      # Step 7: added SARIF format so GitHub Security tab shows findings
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # 1.1.0
        id: depcheck
        with:
          project: ${{ github.event.repository.name }}
          path: '.'
          format: 'ALL' # Step 7: ALL generates HTML + SARIF + JSON in one run
          args: >
            --out /github/workspace/reports
            --failOnCVSS 7
            --enableRetired
            --exclude **/node_modules/**
            --exclude **/.next/**
            --exclude **/dist/**
            --exclude **/build/**

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dependency-check-report
          path: ${{ github.workspace }}/reports
          retention-days: 30

      # Step 7: surface OWASP findings in GitHub Security tab
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v4
        with:
          sarif_file: reports/dependency-check-report.sarif

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    needs: [secret-scanner, sast-scan, codeql-scan, dependency-check]
    permissions:
      contents: read
    strategy:
      matrix:
        service: [frontend, backend]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.service }}

      # Step 6: tests gate the build — broken code never gets packaged
      - name: Run tests
        run: npm test --prefix ${{ matrix.service }} -- --coverage --ci

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage
          retention-days: 7

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - secret-scanner
      - sast-scan
      - codeql-scan
      - dependency-check
      - test
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.secret-scanner.result }}" != "success" ]; then
            echo "::error::Secret scanning failed"
            exit 1
          fi

          if [ "${{ needs.sast-scan.result }}" != "success" ]; then
            echo "::error::SonarQube SAST failed"
            exit 1
          fi

          if [ "${{ needs.codeql-scan.result }}" != "success" ]; then
            echo "::error::CodeQL scan failed"
            exit 1
          fi

          if [ "${{ needs.dependency-check.result }}" != "success" ]; then
            echo "::error::Dependency check failed"
            exit 1
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::Tests failed"
            exit 1
          fi

          echo "All quality gates passed"

  build:
    name: Build, Scan & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality-gate]
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing via OIDC
      security-events: write # upload Trivy SARIF to Security tab
      actions: read # required by upload-sarif
    strategy:
      matrix:
        service: [frontend, backend]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install cosign
        uses: sigstore/cosign-installer@053f9b74638557590800a301da1ba82351507e2c # v3.8.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build locally first — Trivy scans this before anything reaches the registry
      - name: Build image (local, pre-scan)
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}-${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Human-readable table printed directly in the Actions log (all severities for visibility)
      - name: Trivy scan (table)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}-${{ matrix.service }}:scan
          format: table
          severity: LOW,MEDIUM,HIGH,CRITICAL
          exit-code: '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 

      # SARIF for GitHub Security tab — exit-code 1 blocks push on HIGH/CRITICAL
      - name: Trivy scan (SARIF + gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}-${{ matrix.service }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v4
        with:
          sarif_file: trivy-results.sarif

      # Trivy passed — push to registry using cached layers (fast, no rebuild)
      - name: Push image
        id: push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      # Sign pushed digest — keyless via GitHub OIDC, proof in Sigstore Rekor
      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_NAME }}-${{ matrix.service }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      # Inventory every component for compliance + incident response
      - name: Generate SBOM
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.9
        with:
          image: ${{ env.IMAGE_NAME }}-${{ matrix.service }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
        env:
          SYFT_REGISTRY_AUTH_USERNAME: ${{ github.actor }}
          SYFT_REGISTRY_AUTH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90


