version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: athena-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"   # VULN: MongoDB exposed to host
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: athena-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://admin:password123@mongo:27017/athenadb?authSource=admin
      JWT_SECRET: supersecret123
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    container_name: athena-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  mongo-data:
